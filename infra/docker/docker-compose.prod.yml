services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: wizaccountant-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8080"
    volumes:
      - wizaccountant-data:/data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Data Source=/data/wizaccountant.db

volumes:
  wizaccountant-data:
