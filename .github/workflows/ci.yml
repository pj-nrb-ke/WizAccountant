name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore WizAccountant.slnx

      - name: Build
        run: dotnet build WizAccountant.slnx -c Release --no-restore

      - name: Unit tests
        run: >
          dotnet test WizAccountant.slnx
          --no-build -c Release
          --filter "Category!=Integration"
          --logger "trx;LogFileName=unit-results.trx"
          --results-directory TestResults

      - name: Integration tests
        run: >
          dotnet test tests/WizAccountant.Integration.Tests/
          --no-build -c Release
          --filter "Category=Integration"
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/*.trx

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/wiz-api:latest
            ghcr.io/${{ github.repository }}/wiz-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  connector-package:
    name: Connector MSIX
    runs-on: windows-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build WizConnector x86 Release
        run: >
          dotnet publish
          src/WizConnector.Service/WizConnector.Service.csproj
          -c Release
          -r win-x86
          --self-contained true
          -p:PublishSingleFile=true
          -o connector-publish

      - name: Upload connector artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiz-connector-win-x86
          path: connector-publish/
          retention-days: 30
