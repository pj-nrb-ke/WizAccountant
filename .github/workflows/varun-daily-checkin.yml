name: Varun Daily Check-in Emails

# 11AM EAT = 08:00 UTC | 5PM EAT = 14:00 UTC  (Kenya, UTC+3, no DST)
on:
  schedule:
    - cron: '0 8 * * 1-5'    # 11:00 AM EAT â€” morning session start
    - cron: '0 14 * * 1-5'   # 05:00 PM EAT â€” evening wrap-up
  workflow_dispatch:           # manual trigger for testing

env:
  VARUN_EMAIL: varun@wizag.biz
  SENDER_EMAIL: info@emailnotifications.co.ke

jobs:
  send-checkin-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine session type
        id: session
        run: |
          HOUR=$(date -u +"%H")
          if [ "$HOUR" -lt "12" ]; then
            echo "type=AM" >> $GITHUB_OUTPUT
          else
            echo "type=PM" >> $GITHUB_OUTPUT
          fi

      - name: Read session prompt
        id: prompt
        run: |
          {
            echo 'content<<PROMPTEOF'
            cat progress/VARUN-SESSION-PROMPT.md
            echo 'PROMPTEOF'
          } >> $GITHUB_OUTPUT

      - name: Read tracking summary
        id: tracking
        run: |
          {
            echo 'summary<<TRACKEOF'
            awk '/## Progress Summary/{found=1} found{print} /^---/{if(found>0){found++} if(found>2){exit}}' progress/TRACKING.md
            echo 'TRACKEOF'
          } >> $GITHUB_OUTPUT

      - name: Send morning email via Brevo API
        if: steps.session.outputs.type == 'AM'
        run: |
          TODAY=$(date +"%A, %d %B %Y")
          DSTAMP=$(date +"%Y-%m-%d")
          python3 - <<PYEOF
          import json, os, sys, urllib.request, urllib.error

          api_key = os.environ["BREVO_API_KEY"]
          today   = os.environ["TODAY"]
          dstamp  = os.environ["DSTAMP"]
          prompt  = os.environ["SESSION_PROMPT"]
          status  = os.environ["TRACKING_SUMMARY"]

          body = f"""Hi Varun,

Good morning! It is 11AM EAT â€” time to start your development session for {today}.

CURRENT PROJECT STATUS
======================
{status}

YOUR SESSION INSTRUCTIONS
=========================
Open Claude Code and paste the full contents of this file into a new session:
  progress/VARUN-SESSION-PROMPT.md

Or copy it directly from GitHub:
  https://github.com/pj-nrb-ke/WizAccountant/blob/main/progress/VARUN-SESSION-PROMPT.md

--- SESSION PROMPT BELOW ---
{prompt}
--- END OF SESSION PROMPT ---

IMPORTANT â€” END OF SESSION:
Run these commands in Claude before closing:
  git add progress/sessions/{dstamp}-AM.md
  git commit -m "progress: session report {dstamp} AM"
  git push origin main

No email needed. The PM system picks up your commit automatically.

Regards,
WizAccountant PM System (automated)
Reply-To: pj@wizag.biz
"""

          payload = json.dumps({{
              "sender": {{"name": "WizAccountant PM", "email": "info@emailnotifications.co.ke"}},
              "to": [{{"email": "varun@wizag.biz", "name": "Varun"}}],
              "replyTo": {{"email": "pj@wizag.biz", "name": "PJ"}},
              "subject": f"[WizAccountant] Good Morning Varun â€” Session Start {today}",
              "textContent": body
          }}).encode()

          req = urllib.request.Request(
              "https://api.brevo.com/v3/smtp/email",
              data=payload,
              headers={{"api-key": api_key, "Content-Type": "application/json"}},
              method="POST"
          )
          try:
              with urllib.request.urlopen(req) as r:
                  print(f"Morning email sent â€” HTTP {{r.status}}")
          except urllib.error.HTTPError as e:
              print(f"Failed â€” HTTP {{e.code}}: {{e.read().decode()}}", file=sys.stderr)
              sys.exit(1)
          PYEOF
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          TODAY: ${{ env.TODAY }}
          DSTAMP: ${{ env.DSTAMP }}
          SESSION_PROMPT: ${{ steps.prompt.outputs.content }}
          TRACKING_SUMMARY: ${{ steps.tracking.outputs.summary }}

      - name: Send evening email via Brevo API
        if: steps.session.outputs.type == 'PM'
        run: |
          TODAY=$(date +"%A, %d %B %Y")
          DSTAMP=$(date +"%Y-%m-%d")
          python3 - <<PYEOF
          import json, os, sys, urllib.request, urllib.error

          api_key = os.environ["BREVO_API_KEY"]
          today   = os.environ["TODAY"]
          dstamp  = os.environ["DSTAMP"]
          status  = os.environ["TRACKING_SUMMARY"]

          body = f"""Hi Varun,

It is 5PM EAT â€” please wrap up your Claude session for {today}.

CURRENT PROJECT STATUS
======================
{status}

END-OF-SESSION STEPS:
Before closing Claude, ask it to generate your session report, then run:
  git add progress/sessions/{dstamp}-PM.md
  git commit -m "progress: session report {dstamp} PM"
  git push origin main

No email needed. The PM system will pick up your commit within the hour and update
the tracking board automatically.

Have a good evening!

Regards,
WizAccountant PM System (automated)
Reply-To: pj@wizag.biz
"""

          payload = json.dumps({{
              "sender": {{"name": "WizAccountant PM", "email": "info@emailnotifications.co.ke"}},
              "to": [{{"email": "varun@wizag.biz", "name": "Varun"}}],
              "replyTo": {{"email": "pj@wizag.biz", "name": "PJ"}},
              "subject": f"[WizAccountant] Wrap Up Varun â€” End of Day Report Due {today}",
              "textContent": body
          }}).encode()

          req = urllib.request.Request(
              "https://api.brevo.com/v3/smtp/email",
              data=payload,
              headers={{"api-key": api_key, "Content-Type": "application/json"}},
              method="POST"
          )
          try:
              with urllib.request.urlopen(req) as r:
                  print(f"Evening email sent â€” HTTP {{r.status}}")
          except urllib.error.HTTPError as e:
              print(f"Failed â€” HTTP {{e.code}}: {{e.read().decode()}}", file=sys.stderr)
              sys.exit(1)
          PYEOF
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          TODAY: ${{ env.TODAY }}
          DSTAMP: ${{ env.DSTAMP }}
          TRACKING_SUMMARY: ${{ steps.tracking.outputs.summary }}

